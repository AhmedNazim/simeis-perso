name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:

  # =========================
  # CHECK BRANCH RULES
  # =========================
  check-branch:
    runs-on: ubuntu-latest

    if: github.event_name == 'pull_request'

    steps:
      - name: Check branch rules
        run: |
          base=${{ github.base_ref }}
          head=${{ github.head_ref }}

          echo "Base branch: $base"
          echo "Head branch: $head"

          if [[ "$base" == release/* ]]; then
            if [[ "$head" != main && "$head" != bug/* ]]; then
              echo "❌ Invalid PR: only main or bug/* can target release/*"
              exit 1
            fi
          fi

  # =========================
  # CODE QUALITY CHECK
  # =========================
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # Install Rust
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      # Install Python
      - name: Install Python
        run: sudo apt update && sudo apt install python3 python3-pip -y

      # Install Black
      - name: Install black
        run: pip install black

      # Install Typst
      - name: Install Typst
        run: cargo install typst-cli

      # Rust checks
      - name: Cargo check
        run: cargo check

      - name: Rust format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test

      # Python format
      - name: Python format check
        run: black --check .

  # =========================
  # SECURITY & DEPENDENCIES
  # =========================
  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo audit
        run: cargo audit || true

      - name: Install cargo-udeps
        run: cargo install cargo-udeps

      - name: Check unused dependencies
        run: cargo +nightly udeps

  # =========================
  # RELEASE BUILD (main only)
  # =========================
  release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      - name: Install Typst
        run: cargo install typst-cli

      - name: Build release
        run: cargo build --release -p simeis-server

      - name: Strip binary
        run: strip target/release/simeis-server

      - name: Build documentation
        run: typst compile doc/manual.typ doc/manual.pdf